<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support - Secure Healthcare Crypto System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-y: auto;
        }
        .navbar { background: rgba(15, 12, 41, 0.95); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-size: 1.4em; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-menu { display: flex; gap: 30px; list-style: none; }
        .nav-link { color: #aaa; text-decoration: none; padding: 10px; }
        .nav-link:hover, .nav-link.active { color: #00d4ff; }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .contact-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 30px; }
        .contact-card h1 { color: #00d4ff; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #aaa; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1em;
        }
        .form-group textarea { height: 120px; resize: vertical; }
        .btn {
            padding: 12px 25px;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><span>🔐</span><span class="logo-text">HealthCrypto</span></div>
        <ul class="nav-menu">
            <li><a href="{{ url_for('index') }}" class="nav-link">Home</a></li>
            <li><a href="{{ url_for('help_page') }}" class="nav-link">Help</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="contact-card">
            <h1>📧 Contact Support</h1>
            <p style="color: #aaa; margin-bottom: 20px;">Send us a message and we'll get back to you shortly.</p>
            <form method="POST">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" name="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" name="subject" placeholder="Enter subject" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea name="message" placeholder="Describe your issue..." required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </div>
</body>
</html>
